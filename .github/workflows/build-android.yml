name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Fix Gradle wrapper permissions
        run: chmod +x android/gradlew

      - name: Set Gradle properties for Compose compiler fix
        run: |
          mkdir -p android
          cat >> android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m
          org.gradle.parallel=true
          org.gradle.caching=true
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.incremental=false
          EOF

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias my-key-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Uchat,OU=Dev,O=Uchat,L=City,S=State,C=IN" \
            -storepass uchatpass \
            -keypass uchatpass

      - name: Build Debug APK (for testing)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

      - name: Find APK file
        run: find android -name "*.apk" -type f

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Uchat-Android-APK
          path: android/app/build/outputs/apk/**/*.apk
