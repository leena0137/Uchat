name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Expo Prebuild
        run: npx expo prebuild --platform android

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android/app/release.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Uchat" -storepass password -keypass password

      - name: Build APK with Gradle
        run: |
          cd android
          ./gradlew assembleRelease -Pandroid.injected.signing.store.file=release.keystore -Pandroid.injected.signing.store.password=password -Pandroid.injected.signing.key.alias=my-key-alias -Pandroid.injected.signing.key.password=password

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Uchat-Android-APK
          path: android/app/build/outputs/apk/release/app-release.apk
