name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Show Gradle wrapper version
        run: cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Pin Gradle to 8.10.2
        run: |
          sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Disable New Architecture (fixes startup crash)
        run: |
          sed -i 's/newArchEnabled=true/newArchEnabled=false/' android/gradle.properties
          grep 'newArchEnabled' android/gradle.properties

      - name: Show NDK version required
        run: grep -r 'ndkVersion' android/ || echo "No NDK version found"

      - name: Install required Android NDK
        run: |
          NDK_VERSION=$(grep -r 'ndkVersion' android/build.gradle | grep -oP '"[0-9.]+"' | tr -d '"' || echo "27.1.12297006")
          echo "NDK version needed: $NDK_VERSION"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;$NDK_VERSION" || \
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006"

      - name: Copy vector-icons fonts
        run: |
          mkdir -p android/app/src/main/assets/fonts
          cp node_modules/react-native-vector-icons/Fonts/*.ttf android/app/src/main/assets/fonts/ 2>/dev/null || true

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore $GITHUB_WORKSPACE/release.keystore \
            -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Uchat" -storepass password -keypass password

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
            -Pandroid.injected.signing.store.password=password \
            -Pandroid.injected.signing.key.alias=my-key-alias \
            -Pandroid.injected.signing.key.password=password \
            2>&1 | tee /tmp/gradle_output.txt; exit ${PIPESTATUS[0]}

      - name: Show error on failure
        if: failure()
        run: |
          echo "=== FIRST ERROR LINE ==="
          grep -n "error:\|Error:\|FAILED\|Exception\|Could not\|Cannot" /tmp/gradle_output.txt | head -30
          echo ""
          echo "=== LAST 80 LINES ==="
          tail -80 /tmp/gradle_output.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Uchat-Android-APK
          path: android/app/build/outputs/apk/release/app-release.apk
